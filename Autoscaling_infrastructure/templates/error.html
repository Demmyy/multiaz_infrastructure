<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — Status Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0f172a;color:#f1f5f9;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .error-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:40px;text-align:center;max-width:500px}
        h2{margin-bottom:12px}p{color:#94a3b8;margin-bottom:20px;font-size:.9rem}
        a{color:#6366f1;text-decoration:none;font-weight:600}
    </style>
</head>
<body>
    <div class="error-card">
        <h2>⚠️ Error</h2>
        <p>{{ message }}</p>
        <a href="/">← Back to Dashboard</a>
    </div>
</body>
</html>
